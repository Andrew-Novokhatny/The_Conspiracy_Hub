<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ song_name }} - Lyrics (Full Screen)</title>
    <link rel="stylesheet" href="/static/css/band-theme.css">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
</head>
<body class="lyrics-fullscreen-container">
    <div class="lyrics-header">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
                <h1 class="band-title" style="font-size: 1.4rem; margin: 0;">{{ song_name }}</h1>
                {% if artist %}
                <div class="text-muted" style="font-size: 0.85rem; margin-top: 0.2rem;">{{ artist }}{% if bpm %} · {{ bpm }} BPM{% endif %}</div>
                {% endif %}
            </div>
            <a href="/api/lyrics/{{ song_name }}" class="band-btn" style="padding: 0.5rem 1rem;">
                ↩️ Exit
            </a>
        </div>
    </div>

    <div class="lyrics-content fade-in-up">
        {{ lyrics_content | safe }}
    </div>

    <script>
        let isExiting = false;

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !isExiting) {
                isExiting = true;
                window.location.href = '/api/lyrics/{{ song_name }}';
            }
        });

        // Double-tap to exit on touch devices
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;

            if (tapLength < 500 && tapLength > 0 && !isExiting) {
                if (confirm('Exit full screen?')) {
                    isExiting = true;
                    window.location.href = '/api/lyrics/{{ song_name }}';
                }
            }
            lastTap = currentTime;
        });
    </script>
</body>
</html>
