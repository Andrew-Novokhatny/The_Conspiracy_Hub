<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ song_name }} - Lyrics (Full Screen)</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow-y: auto;
            touch-action: manipulation;
        }

        .fullscreen-header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .lyrics-container {
            padding: 2rem 1.5rem;
            max-width: 100%;
            line-height: 2.2;
            font-size: 1.3rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @media (min-width: 768px) {
            .lyrics-container {
                font-size: 1.6rem;
                padding: 3rem;
                line-height: 2.4;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .fullscreen-header {
                padding: 0.5rem 1rem;
            }
            .lyrics-container {
                font-size: 1.1rem;
                padding: 1rem 1.5rem;
                line-height: 1.8;
            }
        }

        .exit-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        .exit-btn:hover {
            background: #2563eb;
        }

        .song-info {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        strong {
            color: #60a5fa;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="fullscreen-header">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold">{{ song_name }}</h1>
                {% if artist %}
                <div class="song-info">{{ artist }}{% if bpm %} • {{ bpm }} BPM{% endif %}</div>
                {% endif %}
            </div>
            <button class="exit-btn"
                    hx-get="/api/lyrics/{{ song_name }}"
                    hx-target="body"
                    hx-push-url="true">
                ↩️ Exit
            </button>
        </div>
    </div>

    <div class="lyrics-container">
        {{ lyrics_content | safe }}
    </div>

    <script>
        // Prevent accidental navigation
        let isExiting = false;

        document.querySelector('.exit-btn').addEventListener('click', function() {
            isExiting = true;
        });

        // Optional: Double-tap to exit for touch devices
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;

            if (tapLength < 500 && tapLength > 0 && !isExiting) {
                // Double tap detected
                if (confirm('Exit full screen?')) {
                    window.location.href = '/api/lyrics/{{ song_name }}';
                }
            }
            lastTap = currentTime;
        });

        // Keyboard shortcut - Escape to exit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !isExiting) {
                isExiting = true;
                window.location.href = '/api/lyrics/{{ song_name }}';
            }
        });
    </script>
</body>
</html>
