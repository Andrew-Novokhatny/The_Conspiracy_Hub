{% extends "base.html" %}

{% block title %}{{ song_name }} - Lyrics{% endblock %}

{% block content %}
<a href="/api/lyrics/" class="back-link">← Back to Lyrics</a>

<div class="lyrics-panel fade-in-up" id="lyrics-container">
    {% include "lyrics/display_partial.html" %}
</div>

<!-- Navigation -->
<div hx-get="/api/lyrics/{{ song_name }}/navigation"
     hx-trigger="load"
     hx-swap="innerHTML"
     class="mt-lg">
</div>
{% endblock %}
