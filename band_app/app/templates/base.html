<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Band Hub{% endblock %}</title>

    <!-- Tailwind CSS CDN for development -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for no-refresh interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    <!-- Mobile-first custom styles -->
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        .fullscreen {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: var(--bg-primary);
            overflow-y: auto;
            padding: 1rem;
        }

        .lyrics-fullscreen {
            font-size: 1.25rem;
            line-height: 2;
            white-space: pre-wrap;
            padding: 2rem 1rem;
        }

        @media (min-width: 768px) {
            .lyrics-fullscreen {
                font-size: 1.5rem;
                padding: 3rem;
            }
        }

        .nav-tab.active {
            background: var(--accent);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Mobile-first navigation -->
    <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40">
        <div class="px-4 py-3">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-bold text-blue-400">🎸 Band Hub</h1>
                <button id="menu-toggle" class="md:hidden p-2 rounded-lg bg-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>

            <!-- Navigation tabs -->
            <div id="nav-menu" class="hidden md:flex space-x-2">
                <a href="/api/lyrics"
                   class="nav-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.url.path.startswith('/api/lyrics') %}active{% else %}bg-slate-700 hover:bg-slate-600{% endif %}"
                   hx-get="/api/lyrics"
                   hx-target="#main-content"
                   hx-indicator="#loading">
                    📜 Lyrics
                </a>
                <a href="/api/songs"
                   class="nav-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.url.path.startswith('/api/songs') %}active{% else %}bg-slate-700 hover:bg-slate-600{% endif %}"
                   hx-get="/api/songs"
                   hx-target="#main-content"
                   hx-indicator="#loading">
                    🎵 Songs
                </a>
                <a href="/api/setlists"
                   class="nav-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors
                          {% if request.url.path.startswith('/api/setlists') %}active{% else %}bg-slate-700 hover:bg-slate-600{% endif %}"
                   hx-get="/api/setlists"
                   hx-target="#main-content"
                   hx-indicator="#loading">
                    📋 Setlists
                </a>
            </div>
        </div>
    </nav>

    <!-- Loading indicator -->
    <div id="loading" class="htmx-indicator">
        <div class="fixed top-0 left-0 w-full h-1 bg-blue-500 animate-pulse"></div>
    </div>

    <!-- Main content area -->
    <main id="main-content" class="container mx-auto px-4 py-6 max-w-4xl">
        {% block content %}
        <!-- Default home content -->
        <div class="text-center py-12">
            <h2 class="text-3xl font-bold mb-4">Welcome to Band Hub</h2>
            <p class="text-slate-400 mb-8">Mobile-optimized band management for The Conspiracy Hub</p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-2xl mx-auto">
                <a href="/api/lyrics"
                   class="block p-6 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors"
                   hx-get="/api/lyrics"
                   hx-target="#main-content">
                    <div class="text-4xl mb-2">📜</div>
                    <h3 class="font-semibold">Lyrics</h3>
                    <p class="text-sm text-slate-400">View song lyrics</p>
                </a>

                <a href="/api/songs"
                   class="block p-6 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors"
                   hx-get="/api/songs"
                   hx-target="#main-content">
                    <div class="text-4xl mb-2">🎵</div>
                    <h3 class="font-semibold">Songs</h3>
                    <p class="text-sm text-slate-400">Browse library</p>
                </a>

                <a href="/api/setlists"
                   class="block p-6 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors"
                   hx-get="/api/setlists"
                   hx-target="#main-content">
                    <div class="text-4xl mb-2">📋</div>
                    <h3 class="font-semibold">Setlists</h3>
                    <p class="text-sm text-slate-400">Previous shows</p>
                </a>
            </div>
        </div>
        {% endblock %}
    </main>

    <!-- Mobile menu script -->
    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('hidden');
        });

        // Hide mobile menu on nav click
        document.getElementById('nav-menu')?.addEventListener('click', function() {
            if (window.innerWidth < 768) {
                this.classList.add('hidden');
            }
        });

        // HTMX loading states
        document.body.addEventListener('htmx:beforeRequest', function() {
            document.body.classList.add('loading');
        });

        document.body.addEventListener('htmx:afterRequest', function() {
            document.body.classList.remove('loading');
        });
    </script>
</body>
</html>
