<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Conspiracy Hub{% endblock %}</title>

    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/band-theme.css">

    <!-- HTMX for no-refresh interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>

    {% block head_extra %}{% endblock %}
</head>

<body>
    <!-- Navigation -->
    <nav class="band-nav">
        <div class="nav-inner">
            <div class="nav-header">
                <a href="/" class="nav-brand">🎸 The Conspiracy Hub</a>
                <button class="nav-toggle" id="menu-toggle" aria-label="Toggle navigation">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>

            <div class="nav-links" id="nav-menu">
                <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">
                    🏠 Home
                </a>
                <a href="/api/lyrics/" class="nav-link {% if active_page == 'lyrics' %}active{% endif %}">
                    📜 Lyrics
                </a>
                <a href="/api/songs/" class="nav-link {% if active_page == 'songs' %}active{% endif %}">
                    🎵 Songs
                </a>
                <a href="/api/setlists/" class="nav-link {% if active_page == 'setlists' %}active{% endif %}">
                    📋 Setlists
                </a>
                <a href="/api/builder/" class="nav-link {% if active_page == 'builder' %}active{% endif %}">
                    📝 Setlist Builder
                </a>
            </div>
        </div>
    </nav>

    <!-- Loading indicator -->
    <div id="loading" class="htmx-indicator">
        <div class="loading-bar"></div>
    </div>

    <!-- Main content area -->
    <main class="container py-lg">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% block footer %}
    <div class="page-footer">
        ❤️ Buckingham Forever
    </div>
    {% endblock %}

    <!-- Mobile menu script -->
    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function () {
            document.getElementById('nav-menu')?.classList.toggle('open');
        });

        // Hide mobile menu on nav click
        document.querySelectorAll('.nav-link').forEach(function (link) {
            link.addEventListener('click', function () {
                if (window.innerWidth < 600) {
                    document.getElementById('nav-menu')?.classList.remove('open');
                }
            });
        });
    </script>

    {% block scripts_extra %}{% endblock %}
</body>

</html>
